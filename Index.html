<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Matriz Vitruviana - Núcleo</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; padding: 40px; }
        .card { background: #1e293b; border-radius: 12px; padding: 20px; border-left: 5px solid #38bdf8; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h1 { color: #38bdf8; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .item { background: #334155; padding: 15px; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>Matriz Vitruviana</h1>
    <p>O Núcleo de Expansão está ativo. Aqui reside a síntese do seu potencial terapêutico.</p>
    
    <div class="grid" id="painel">
        <div class="item">
            <h3>Eixo: Coluna Lombar</h3>
            <p><strong>Meridiano:</strong> Rim</p>
            <p><strong>Sefirá:</strong> Yesod</p>
            <p><strong>Foco:</strong> Estrutura e Manifestação</p>
        </div>
        <div class="item">
            <h3>Eixo: Fêmur (Estrutura)</h3>
            <p><strong>Meridiano:</strong> Bexiga</p>
            <p><strong>Foco:</strong> Sustentação da Jornada</p>
        </div>
    </div>
</body>
</html>
